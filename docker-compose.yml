version: "3.9"

services:

  # =========================
  # SQL SERVER
  # =========================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - backend

  # =========================
  # MONGODB
  # =========================
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  # =========================
  # IDENTITY SERVICE
  # =========================
  identity-service:
    build:
      context: ./Services/IdentityService
    ports:
      - "7093:8080"
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${IDENTITY_DB}
      JwtSettings__Secret: ${JWT_SECRET}
      SmtpSettings__Host: ${SMTP_HOST}
      SmtpSettings__Port: ${SMTP_PORT}
      SmtpSettings__Username: ${SMTP_USERNAME}
      SmtpSettings__Password: ${SMTP_PASSWORD}
      SmtpSettings__From: ${SMTP_FROM}
      SmtpSettings__FromDisplayName: ${SMTP_FROM_NAME}
    networks:
      - backend

  # =========================
  # CATALOG SERVICE
  # =========================
  catalog-service:
    build:
      context: ./Services/CatalogService
    ports:
      - "7103:8080"
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${CATALOG_DB}
    networks:
      - backend

  # =========================
  # ORDERING SERVICE
  # =========================
  ordering-service:
    build:
      context: ./Services/OrderingService
    ports:
      - "7076:8080"
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${ORDERING_DB}
    networks:
      - backend

  # =========================
  # BASKET SERVICE (REDIS)
  # =========================
  basket-service:
    build:
      context: ./Services/BasketService
    ports:
      - "7021:8080"
    depends_on:
      - redis
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Redis__ConnectionString: ${REDIS_CONNECTION}
    networks:
      - backend

  # =========================
  # DISCOUNT SERVICE (MONGO)
  # =========================
  discount-service:
    build:
      context: ./Services/DiscountService
    ports:
      - "7002:8080"
    depends_on:
      - mongodb
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Mongo__ConnectionString: ${MONGO_CONNECTION}
      Mongo__Database: ${MONGO_DB_DISCOUNT}
    networks:
      - backend

  # =========================
  # CHAT SERVICE (MONGO + REDIS)
  # =========================
  chat-service:
    build:
      context: ./Services/ChatService
    ports:
      - "7229:8080"
    depends_on:
      - mongodb
      - redis
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Mongo__ConnectionString: ${MONGO_CONNECTION}
      Mongo__Database: ${MONGO_DB_CHAT}
      Redis__ConnectionString: ${REDIS_CONNECTION}
    networks:
      - backend

# =========================
# NETWORKS
# =========================
networks:
  backend:

# =========================
# VOLUMES
# =========================
volumes:
  sql_data:
  mongo_data: