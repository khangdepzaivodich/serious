services:
  # =========================
  # SQL SERVER
  # =========================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "YourStrong@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - backend

  # =========================
  # MONGODB
  # =========================
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  # =========================
  # IDENTITY SERVICE
  # =========================
  identity-service:
    build:
      context: ./Services/IdentityService
    ports:
      - "7093:8080"
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=IdentityDb;User Id=sa;Password=YourStrong@123;TrustServerCertificate=True;ConnectRetryCount=5;ConnectRetryInterval=10;
    networks:
      - backend

  # =========================
  # CATALOG SERVICE
  # =========================
  catalog-service:
    build:
      context: ./Services/CatalogService
    ports:
      - "7103:8080"
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CatalogDb;User Id=sa;Password=YourStrong@123;TrustServerCertificate=True;ConnectRetryCount=5;ConnectRetryInterval=10;
    networks:
      - backend

  # =========================
  # ORDERING SERVICE
  # =========================
  ordering-service:
    build:
      context: ./Services/OrderingService
    ports:
      - "7076:8080"
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=OrderingDb;User Id=sa;Password=YourStrong@123;TrustServerCertificate=True;ConnectRetryCount=5;ConnectRetryInterval=10;
    networks:
      - backend

  # =========================
  # BASKET SERVICE (REDIS)
  # =========================
  basket-service:
    build:
      context: ./Services/BasketService
    ports:
      - "7021:8080"
    depends_on:
      - redis
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__ConnectionString=redis:6379,abortConnect=false
    networks:
      - backend

  # =========================
  # DISCOUNT SERVICE (MONGO)
  # =========================
  discount-service:
    build:
      context: ./Services/DiscountService
    ports:
      - "7002:8080"
    depends_on:
      - mongodb
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Mongo__ConnectionString=mongodb://mongodb:27017
      - Mongo__Database=DiscountDb
    networks:
      - backend

  # =========================
  # CHAT SERVICE (MONGO)
  # =========================
  chat-service:
    build:
      context: ./Services/ChatService
    ports:
      - "7229:8080"
    depends_on:
      - mongodb
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Mongo__ConnectionString=mongodb://mongodb:27017
      - Mongo__Database=ChatDb
      - Redis__ConnectionString=redis:6379,abortConnect=false
    networks:
      - backend

# =========================
# NETWORK
# =========================
networks:
  backend:

# =========================
# VOLUMES
# =========================
volumes:
  sql_data:
  mongo_data:
