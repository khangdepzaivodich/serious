name: .NET CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore serious.slnx

    - name: Build
      run: dotnet build serious.slnx --no-restore

    - name: Test
      run: dotnet test serious.slnx --no-build --verbosity normal --logger "console;verbosity=normal"

    - name: Discord Notification
      if: always()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: "Backend Build Status"
        description: "Build completed for branch ${{ github.ref_name }}"
        color: 0x0000ff