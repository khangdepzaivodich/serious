name: .NET CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore serious.slnx

    - name: Build
      run: dotnet build serious.slnx --no-restore

    - name: Test
      run: dotnet test serious.slnx --no-build --verbosity normal

    - name: Notify Discord (Success)
      if: success()
      run: |
        curl -H "Content-Type: application/json" \
        -X POST \
        -d "{
          \"content\": \"Build Passed\nRepository: ${{ github.repository }}\nActor: ${{ github.actor }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.event.head_commit.message }}\"
        }" \
        ${{ secrets.DISCORD_WEBHOOK }}

    - name: Notify Discord (Failure)
      if: failure()
      run: |
        curl -H "Content-Type: application/json" \
        -X POST \
        -d "{
          \"content\": \"Build Failed\nRepository: ${{ github.repository }}\nActor: ${{ github.actor }}\nBranch: ${{ github.ref_name }}\nLogs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
        }" \
        ${{ secrets.DISCORD_WEBHOOK }}